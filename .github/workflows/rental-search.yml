name: Rental Search

on:
  schedule:
    # Twice daily: 8am Pacific (15:00 UTC) and 6pm Pacific (01:00 UTC).
    # These run against UTC. DST drift (PDT vs PST) shifts them by one hour
    # across the year; acceptable for a digest bot.
    - cron: "0 15 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: rental-search
  cancel-in-progress: false

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run search
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python -m src.main

      - name: Commit updated seen.json
        run: |
          git config user.name "rental-bot"
          git config user.email "rental-bot@users.noreply.github.com"
          git add state/seen.json
          if git diff --staged --quiet; then
            echo "No changes to seen.json"
          else
            git commit -m "chore: update seen listings [skip ci]"
            git push
          fi
